name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rate_tracker_test
          POSTGRES_USER: rate_tracker
          POSTGRES_PASSWORD: rate_tracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rate_tracker -d rate_tracker_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        env:
          DJANGO_SECRET_KEY: ci-secret-key
          POSTGRES_DB: rate_tracker_test
          POSTGRES_USER: rate_tracker
          POSTGRES_PASSWORD: rate_tracker
          POSTGRES_HOST: localhost
          REDIS_URL: redis://localhost:6379/1
          INGEST_BEARER_TOKEN: ci-test-token
          DBT_PROJECT_DIR: ${{ github.workspace }}/dbt
          DBT_PROFILES_DIR: ${{ github.workspace }}/dbt
          DBT_RUN_AFTER_INGEST: "false"
        run: python manage.py migrate --noinput

      - name: Pytest
        env:
          DJANGO_SECRET_KEY: ci-secret-key
          POSTGRES_DB: rate_tracker_test
          POSTGRES_USER: rate_tracker
          POSTGRES_PASSWORD: rate_tracker
          POSTGRES_HOST: localhost
          REDIS_URL: redis://localhost:6379/1
          INGEST_BEARER_TOKEN: ci-test-token
          DBT_PROJECT_DIR: ${{ github.workspace }}/dbt
          DBT_PROFILES_DIR: ${{ github.workspace }}/dbt
          DBT_RUN_AFTER_INGEST: "false"
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
        run: npm run build
