# Declares Django-owned raw table as a dbt source (no transformation at this layer).

version: 2

sources:
  - name: rates
    description: Django-owned raw ingest — immutable scrape payloads
    schema: public
    tables:
      - name: raw_responses
        # Django model RawResponse → table rates_rawresponse
        identifier: rates_rawresponse
        description: Full parquet/webhook payloads keyed by external_id
